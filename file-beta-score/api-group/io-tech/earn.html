<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raybil World - Instagram Accounts</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #f0f2f5;
            --tg-theme-text-color: #222;
            --tg-theme-button-color: #3390ec;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
        }

        /* Header Section */
        header {
            background: linear-gradient(135deg, #1d2b64, #f8cdda);
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #user-photo {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid white;
            background: #ccc;
        }

        .user-details h3 {
            margin: 0;
            font-size: 16px;
        }

        .user-details p {
            margin: 0;
            font-size: 12px;
            opacity: 0.9;
        }

        .credit {
            font-size: 10px;
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 10px;
            border-radius: 10px;
            text-align: right;
        }

        /* Grid Layout */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 20px;
        }

        .box {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .box:active {
            transform: scale(0.95);
        }

        .box img {
            width: 40px;
            height: 40px;
        }

        .box span {
            font-weight: bold;
            color: #555;
            font-size: 14px;
        }

    </style>
</head>
<body>

    <header>
        <div class="user-info">
            <img id="user-photo" src="" alt="👤">
            <div class="user-details">
                <h3 id="user-name">User Name</h3>
                <p>UID: <span id="user-id">00000000</span></p>
            </div>
        </div>
        <div class="credit">
            Developed by<br><b>Rayhan Team</b>
        </div>
    </header>

    <div class="grid-container" id="grid">
        </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Full screen setup

        // Get User Data from Telegram
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('user-name').innerText = user.first_name + (user.last_name ? ' ' + user.last_name : '');
            document.getElementById('user-id').innerText = user.id;
            if (user.photo_url) {
                document.getElementById('user-photo').src = user.photo_url;
            }
        }

        // Generate Grid Items (#1 to #5m)
        const grid = document.getElementById('grid');
        const items = ["#1", "#2", "#3", "#4", "#5m"];

        items.forEach(item => {
            const box = document.createElement('a');
            box.href = "https://www.instagram.com";
            box.className = 'box';
            box.target = "_blank";
            
            box.innerHTML = `
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" alt="IG">
                <span>${item}</span>
            `;
            
            grid.appendChild(box);
        });
    </script>
</body>
</html>
